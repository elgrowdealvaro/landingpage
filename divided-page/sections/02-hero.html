<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>02 · Hero — Growdrive preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body class="preview">
<!-- #section:start -->
<section class="hero">
  <div class="container hero__inner">
    <div class="hero__pill-wrap">
      <span class="pill">
        <span class="pill__dot"></span>
        Infraestructura outbound todo en uno
      </span>
    </div>

    <h1 class="h-display hero__title">
      Agenda reuniones calificadas en automático,<br>
      <span class="accent">sin SDRs ni agencias.</span>
    </h1>

    <p class="hero__lead">
      Llegamos a tus clientes ideales con un sistema de outbound predecible.<br>
      Infraestructura, IA y datos — todo en un solo lugar.
    </p>

    <div class="hero__ctas">
      <a href="#cta" class="btn btn--primary">
        Inicia ahora
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </a>
      <a href="#how" class="btn btn--ghost">Agenda una demo</a>
    </div>

    <div class="hero__mock">
      <div class="placeholder placeholder--hero" data-label="Dashboard preview"></div>
    </div>
  </div>
</section>
<!-- #section:end -->
</body>
</html>
